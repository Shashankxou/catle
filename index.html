<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catle – Cattle Disease Classification</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      padding: 3rem 4rem;
      text-align: center;
      max-width: 600px;
    }
    h1 { margin-top: 0; }
    p { color: #555; line-height: 1.6; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .features { text-align: left; margin: 1.5rem 0; }
    .features li { margin-bottom: 0.5rem; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Catle</h1>
    <p>Cattle Disease Classification using Vision Transformer (ViT)</p>
    <ul class="features">
      <li>Upload cattle images for AI-powered disease detection</li>
      <li>Supports multiple disease categories</li>
      <li>Detailed diagnosis reports with PDF export</li>
      <li>Multi-language support</li>
      <li>Admin dashboard for managing reports</li>
    </ul>
    <p>
      <a href="https://github.com/Shashankxou/catle">View on GitHub</a>
    </p>
  </div>
</body>
</html>
