name: Capstone Project CI / Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'capstone-project/**'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # 1. Validate the Python environment
  # ──────────────────────────────────────────────
  validate:
    name: Validate Python app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: capstone-project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: capstone-project/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch to keep CI fast (GPU not available in runners)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install Flask Werkzeug gunicorn Pillow reportlab transformers numpy

      - name: Syntax-check app.py
        run: python -m py_compile app.py && echo "app.py syntax OK"

      - name: Check imports
        run: |
          python - <<'EOF'
          import importlib, sys
          mods = ["flask", "torch", "PIL", "transformers", "gunicorn"]
          missing = [m for m in mods if importlib.util.find_spec(m) is None]
          if missing:
              print(f"Missing modules: {missing}", file=sys.stderr)
              sys.exit(1)
          print("All required modules found.")
          EOF

  # ──────────────────────────────────────────────
  # 2. Build & push Docker image (deploy step)
  #    Runs only on pushes to main (not on PRs).
  # ──────────────────────────────────────────────
  docker-build:
    name: Build Docker image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run on push to main, not on pull-request triggers
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./capstone-project
          file: ./capstone-project/Dockerfile
          push: false
          tags: capstone-project:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 3. Deployment instructions
  #    This step always runs and tells you how to
  #    wire up a live deployment target.
  # ──────────────────────────────────────────────
  deployment-instructions:
    name: Deployment instructions
    needs: docker-build
    runs-on: ubuntu-latest
    permissions: {}
    if: always()

    steps:
      - name: Print deployment instructions
        run: |
          echo "============================================================"
          echo "  Capstone Project — Deployment instructions"
          echo "============================================================"
          echo ""
          echo "The app is a Flask application served by Gunicorn."
          echo "A render.yaml is already present in capstone-project/ for"
          echo "one-click Render.com deployment."
          echo ""
          echo "To deploy on Render.com (recommended, free tier available):"
          echo "  1. Go to https://render.com and sign in."
          echo "  2. Click 'New +' → 'Web Service'."
          echo "  3. Connect this GitHub repository."
          echo "  4. Set the Root Directory to: capstone-project"
          echo "  5. Render will auto-detect render.yaml and configure the service."
          echo "  6. Add your SECRET_KEY environment variable in the Render dashboard."
          echo ""
          echo "To deploy via Docker manually:"
          echo "  cd capstone-project"
          echo "  docker build -t capstone-project ."
          echo "  docker run -p 5000:5000 -e PORT=5000 -e SECRET_KEY=<secret> capstone-project"
          echo ""
          echo "To set a custom deploy target in this workflow:"
          echo "  Edit .github/workflows/deploy-capstone.yml"
          echo "  Add a step after 'docker-build' that pushes the image to your"
          echo "  registry (GHCR, Docker Hub, ECR, etc.) and triggers a redeploy."
          echo "============================================================"
